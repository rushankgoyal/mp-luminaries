name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Generate missing article portraits
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-missing-images.mjs
      # Commit whatever artwork succeeded even if some generations failed —
      # a failed image must not throw away the successful ones.
      - name: Commit generated images
        if: always()
        run: |
          if ! git diff --quiet || [ -n "$(git status --porcelain src/assets/images)" ]; then
            git config user.name "mp-luminaries-bot"
            git config user.email "actions@github.com"
            git add src/assets/images
            git commit -m "Generate article portraits [bot]"
            git push origin main
          fi

  # Build and deploy even if image generation failed: the site holds back
  # stories whose artwork is missing (see src/articles/articles.11tydata.js),
  # so a broken image source can never block the whole edition. The failed
  # images job still marks the run red so the problem stays visible.
  build:
    needs: images
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: PATH_PREFIX="/${{ github.event.repository.name }}/" npx eleventy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
